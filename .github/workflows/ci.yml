name: Q-Agent Backend - Continuous Integration

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-and-test:
    name: Build & Validate Solution
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET 8.0 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Cache NuGet Packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore Dependencies
      run: dotnet restore back-end/QA-Application.sln

    - name: Build Solution (Release Mode)
      run: dotnet build back-end/QA-Application.sln --no-restore --configuration Release

    - name: Run Automated Unit Tests (xUnit)
      run: dotnet test back-end/QA-Application.sln --no-restore --configuration Release --verbosity normal
